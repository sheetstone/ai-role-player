services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    # admin-data volume is mounted over dist/data so persona/scenario JSON
    # changes survive container restarts. On first run Docker seeds the volume
    # from the image (the default JSON files baked in during build).
    volumes:
      - admin-data:/app/dist/data
    expose:
      - "3001"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  admin-data:
